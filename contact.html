<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{background:#f5f5f5;}

header{
background:#7c0308;
color:white;
text-align:center;
padding:15px;
position:relative;
}

header img{position:absolute;left:20px;height:50px;}
header h1{color:#ffde59;}

nav{text-align:center;background:white;padding:10px;}

nav a{
margin:5px;
padding:10px 15px;
background:#ffde59;
color:#7c0308;
text-decoration:none;
border-radius:5px;
font-weight:bold;
display:inline-block;
}

form{
background:white;
max-width:500px;
margin:20px auto;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#7c0308;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<img src="logo.png">
<h1>FRANK-LINE CONSTRUCTIONS</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="services.html">Services</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>

<form onsubmit="send(event)">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<input type="text" placeholder="Phone Number" required>
<textarea placeholder="Message"></textarea>
<button type="submit">Send</button>
</form>

<script>
function send(e){
e.preventDefault();
alert("Message sent successfully!");
}
</script>

</body>
</html>
